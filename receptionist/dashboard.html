<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Регистратура — MedSystem</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="layout">
    <div th:replace="~{fragments :: sidebar-receptionist}" th:with="activePage='dashboard'"></div>
    <main class="main">
        <div class="topbar">
            <div><h1>Панель регистратора</h1><p>Запись пациентов на приём</p></div>
            <button class="btn btn-primary"
                    onclick="document.getElementById('bookModal').classList.add('open')">
                + Записать пациента
            </button>
        </div>
        <div class="content">
            <div th:if="${success}" class="alert alert-success">✓ <span th:text="${success}"></span></div>

            <div class="stats-grid">
                <div class="stat-card blue">
                    <span class="stat-icon">🧑‍⚕️</span>
                    <div class="stat-value" th:text="${totalPatients}">0</div>
                    <div class="stat-label">Пациентов в базе</div>
                </div>
                <div class="stat-card green">
                    <span class="stat-icon">📅</span>
                    <div class="stat-value" th:text="${scheduledToday}">0</div>
                    <div class="stat-label">Записей на сегодня</div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <span class="card-title">Предстоящие записи</span>
                    <a th:href="@{/receptionist/appointments}" class="btn btn-ghost btn-sm">Все записи →</a>
                </div>
                <div class="table-wrap">
                    <table>
                        <thead><tr>
                            <th>Пациент</th><th>Врач</th><th>Специализация</th><th>Дата и время</th><th>Статус</th>
                        </tr></thead>
                        <tbody>
                        <tr th:each="a : ${upcomingAppointments}">
                            <td><strong th:text="${a.patient.user.fullName}">—</strong></td>
                            <td th:text="${a.doctor.user.fullName}">—</td>
                            <td><span class="badge badge-blue" th:text="${a.doctor.specialization}">—</span></td>
                            <td><span class="time-chip"
                                      th:text="${#temporals.format(a.appointmentTime,'dd.MM.yyyy HH:mm')}">—</span></td>
                            <td>
                                <span th:switch="${a.status.name()}">
                                    <span th:case="'SCHEDULED'"   class="badge badge-blue">Запланирован</span>
                                    <span th:case="'ACCEPTED'"    class="badge" style="background:rgba(16,185,129,.15);color:#34d399">Принят</span>
                                    <span th:case="'IN_PROGRESS'" class="badge badge-cyan">На приёме</span>
                                    <span th:case="'COMPLETED'"   class="badge badge-green">Завершён</span>
                                    <span th:case="'CANCELLED'"   class="badge badge-red">Отменён</span>
                                    <span th:case="'NO_SHOW'"     class="badge badge-gray">Не явился</span>
                                    <span th:case="*" class="badge badge-gray" th:text="${a.status}">—</span>
                                </span>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(upcomingAppointments)}">
                            <td colspan="5">
                                <div class="empty-state">
                                    <div class="icon">📅</div><h3>Нет предстоящих записей</h3>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- BOOK MODAL -->
<div class="modal-overlay" id="bookModal">
    <div class="modal">
        <button class="modal-close"
                onclick="document.getElementById('bookModal').classList.remove('open')">✕</button>
        <div class="modal-title">Записать пациента на приём</div>
        <form th:action="@{/receptionist/appointments/book}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="form-grid">
                <div class="form-group" style="grid-column:1/-1">
                    <label>Пациент</label>
                    <select name="patientId" required>
                        <option value="">— выберите пациента —</option>
                        <option th:each="p : ${patients}" th:value="${p.id}"
                                th:text="${p.user.fullName}">—</option>
                    </select>
                </div>
                <div class="form-group" style="grid-column:1/-1">
                    <label>Врач</label>
                    <select name="doctorId" required>
                        <option value="">— выберите врача —</option>
                        <option th:each="d : ${doctors}" th:value="${d.id}"
                                th:text="${d.user.fullName + ' (' + d.specialization + ')'}">—</option>
                    </select>
                </div>
                <div class="form-group" style="grid-column:1/-1">
                    <label>Дата и время</label>
                    <input type="datetime-local" name="appointmentTime" id="dashApptTime" required>
                </div>
                <div class="form-group" style="grid-column:1/-1">
                    <label>Причина обращения</label>
                    <input type="text" name="reason" placeholder="Жалобы пациента">
                </div>
            </div>
            <div class="mt-6" style="display:flex;gap:12px;justify-content:flex-end">
                <button type="button" class="btn btn-ghost"
                        onclick="document.getElementById('bookModal').classList.remove('open')">Отмена</button>
                <button type="submit" class="btn btn-primary">Записать</button>
            </div>
        </form>
    </div>
</div>
<script>
(function() {
    var now = new Date();
    now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
    var minVal = now.toISOString().slice(0, 16);
    document.getElementById('dashApptTime').min = minVal;
})();
</script>
</body>
</html>
