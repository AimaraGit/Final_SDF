<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — MedSystem</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="login-page">
    <div class="login-bg"></div>
    <div class="login-card">
        <div class="login-logo">
            <div class="icon">🏥</div>
            <div>
                <h1>MedSystem</h1>
                <p>Hospital Management</p>
            </div>
        </div>

        <h2 class="login-title">Добро пожаловать</h2>
        <p class="login-sub">Введите данные для входа в систему</p>

        <div class="login-hint">
            <strong>admin</strong> / admin123 — Администратор<br>
            <strong>doctor1</strong> / doctor123 — Врач<br>
            <strong>receptionist1</strong> / recept123 — Регистратор<br>
            <strong>patient1</strong> / patient123 — Пациент
        </div>

        <div th:if="${param.error}" class="alert alert-danger">
            ⚠ Неверный логин или пароль
        </div>
        <div th:if="${param.logout}" class="alert alert-success">
            ✓ Вы успешно вышли из системы
        </div>

        <form class="login-form" th:action="@{/login}" method="post">
            <div class="form-group">
                <label>Логин</label>
                <input type="text" name="username" placeholder="Введите логин" required autofocus>
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" name="password" placeholder="Введите пароль" required>
            </div>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="login-btn">Войти в систему →</button>
        </form>
    </div>
</div>
</body>
</html>
