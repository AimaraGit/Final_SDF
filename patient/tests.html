<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Каталог анализов — MedSystem</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .test-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:16px; }
        .test-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:20px; display:flex; flex-direction:column; gap:12px; transition:border-color .15s,transform .15s; }
        .test-card:hover { border-color:var(--accent); transform:translateY(-2px); }
        .test-card-top { display:flex; justify-content:space-between; align-items:flex-start; }
        .test-name { font-weight:600; font-size:15px; line-height:1.3; }
        .test-desc { font-size:13px; color:var(--text-muted); line-height:1.5; }
        .test-footer { display:flex; align-items:center; justify-content:space-between; margin-top:auto; padding-top:12px; border-top:1px solid var(--border); }
        .test-price { font-size:18px; font-weight:700; font-family:'JetBrains Mono',monospace; }
        .filter-bar { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px; }
        .filter-chip { padding:6px 14px; border-radius:20px; font-size:13px; font-weight:500; border:1px solid var(--border); background:var(--bg-card2); color:var(--text-soft); cursor:pointer; text-decoration:none; transition:all .15s; }
        .filter-chip:hover, .filter-chip.active { background:var(--accent); border-color:var(--accent); color:#fff; }
    </style>
</head>
<body>
<div class="layout">
    <div th:replace="~{fragments :: sidebar-patient}" th:with="activePage='tests',cartCount=${cartCount}"></div>
    <main class="main">
        <div class="topbar">
            <div><h1>Каталог анализов</h1><p>Выберите нужные исследования</p></div>
            <a th:href="@{/patient/tests/cart}" class="btn btn-primary">
                🛒 Корзина
                <span th:if="${cartCount > 0}"
                      style="background:rgba(255,255,255,.25);border-radius:20px;padding:1px 8px;font-size:12px;margin-left:4px"
                      th:text="${cartCount}">0</span>
            </a>
        </div>
        <div class="content">
            <div th:if="${success}" class="alert alert-success">✓ <span th:text="${success}"></span></div>

            <!-- Category filters -->
            <div class="filter-bar">
                <a th:href="@{/patient/tests}" class="filter-chip"
                   th:classappend="${selectedCategory == null} ? 'active'">Все</a>
                <a th:each="cat : ${categories}"
                   th:href="@{/patient/tests(category=${cat})}"
                   class="filter-chip"
                   th:classappend="${selectedCategory == cat} ? 'active'"
                   th:text="${cat}">—</a>
            </div>

            <div class="test-grid">
                <div th:each="t : ${tests}" class="test-card">
                    <div class="test-card-top">
                        <div>
                            <div class="test-name" th:text="${t.name}">—</div>
                            <span class="badge badge-cyan" style="margin-top:6px"
                                  th:text="${t.category}">—</span>
                        </div>
                    </div>
                    <div class="test-desc" th:text="${t.description != null ? t.description : ''}">—</div>
                    <div class="test-footer">
                        <div>
                            <div class="test-price"
                                 th:text="${#numbers.formatDecimal(t.price,0,'COMMA',0,'POINT') + ' ₸'}">—</div>
                            <div style="font-size:11px;color:var(--text-muted);margin-top:2px"
                                 th:text="'Результат через ' + (t.daysToResult != null ? t.daysToResult : 1) + ' дн.'">—</div>
                        </div>
                        <span th:if="${cart.contains(t.id)}" class="badge badge-green"
                              style="padding:6px 12px">✓ В корзине</span>
                        <form th:unless="${cart.contains(t.id)}"
                              th:action="@{/patient/tests/cart/add/{id}(id=${t.id})}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <input type="hidden" name="redirect"
                                   th:value="${selectedCategory != null ? '/patient/tests?category=' + selectedCategory : '/patient/tests'}"/>
                            <button type="submit" class="btn btn-primary btn-sm">+ В корзину</button>
                        </form>
                    </div>
                </div>
            </div>

            <div th:if="${#lists.isEmpty(tests)}" class="empty-state" style="margin-top:40px">
                <div class="icon">🧪</div>
                <h3>Анализов не найдено</h3>
                <p>Попробуйте выбрать другую категорию</p>
            </div>
        </div>
    </main>
</div>
</body>
</html>
