<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Мои записи — MedSystem</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="layout">
    <div th:replace="~{fragments :: sidebar-patient}" th:with="activePage='appointments',cartCount=${0}"></div>
    <main class="main">
        <div class="topbar">
            <div><h1>Мои записи</h1><p>История и предстоящие визиты</p></div>
            <button class="btn btn-primary"
                    onclick="document.getElementById('bookModal').classList.add('open')">
                + Записаться к врачу
            </button>
        </div>
        <div class="content">
            <div th:if="${success}" class="alert alert-success">✓ <span th:text="${success}"></span></div>
            <div th:if="${error}"   class="alert alert-danger">⚠ <span th:text="${error}"></span></div>

            <div class="card">
                <div class="table-wrap">
                    <table>
                        <thead><tr>
                            <th>Врач</th><th>Специализация</th><th>Дата и время</th>
                            <th>Причина</th><th>Статус</th><th>Действия</th>
                        </tr></thead>
                        <tbody>
                        <tr th:each="a : ${appointments}">
                            <td><strong th:text="${a.doctor.user.fullName}">—</strong></td>
                            <td><span class="badge badge-blue" th:text="${a.doctor.specialization}">—</span></td>
                            <td><span class="time-chip"
                                      th:text="${#temporals.format(a.appointmentTime,'dd.MM.yyyy HH:mm')}">—</span></td>
                            <td th:text="${a.reason != null ? a.reason : '—'}">—</td>
                            <td>
                                <span th:switch="${a.status.name()}">
                                    <span th:case="'SCHEDULED'"   class="badge badge-blue">Запланирован</span>
                                    <span th:case="'ACCEPTED'"    class="badge" style="background:rgba(16,185,129,.15);color:#34d399">Принят</span>
                                    <span th:case="'IN_PROGRESS'" class="badge badge-cyan">На приёме</span>
                                    <span th:case="'COMPLETED'"   class="badge badge-green">Завершён</span>
                                    <span th:case="'CANCELLED'"   class="badge badge-red">Отменён</span>
                                    <span th:case="'NO_SHOW'"     class="badge badge-gray">Не явился</span>
                                    <span th:case="*" class="badge badge-gray" th:text="${a.status}">—</span>
                                </span>
                            </td>
                            <td>
                                <form th:if="${a.status.name() == 'SCHEDULED'}"
                                      th:action="@{/patient/appointments/cancel/{id}(id=${a.id})}" method="post">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" class="btn btn-danger btn-sm"
                                            onclick="return confirm('Отменить запись?')">Отменить</button>
                                </form>
                                <span th:unless="${a.status.name() == 'SCHEDULED'}"
                                      style="color:var(--text-muted);font-size:13px">—</span>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(appointments)}">
                            <td colspan="6">
                                <div class="empty-state">
                                    <div class="icon">📅</div>
                                    <h3>Записей нет</h3>
                                    <p>Запишитесь к врачу прямо сейчас</p>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- BOOK MODAL -->
<div class="modal-overlay" id="bookModal">
    <div class="modal">
        <button class="modal-close"
                onclick="document.getElementById('bookModal').classList.remove('open')">✕</button>
        <div class="modal-title">Записаться к врачу</div>
        <form th:action="@{/patient/appointments/book}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="form-grid">
                <div class="form-group" style="grid-column:1/-1">
                    <label>Врач</label>
                    <select name="doctorId" required>
                        <option value="">— выберите врача —</option>
                        <option th:each="d : ${doctors}" th:value="${d.id}"
                                th:text="${d.user.fullName + ' (' + d.specialization + ')'}">—</option>
                    </select>
                </div>
                <div class="form-group" style="grid-column:1/-1">
                    <label>Дата и время</label>
                    <input type="datetime-local" name="appointmentTime"
                           id="apptTime" required>
                </div>
                <div class="form-group" style="grid-column:1/-1">
                    <label>Причина обращения</label>
                    <input type="text" name="reason" placeholder="Опишите жалобы или цель визита">
                </div>
            </div>
            <div class="mt-6" style="display:flex;gap:12px;justify-content:flex-end">
                <button type="button" class="btn btn-ghost"
                        onclick="document.getElementById('bookModal').classList.remove('open')">Отмена</button>
                <button type="submit" class="btn btn-primary">Записаться</button>
            </div>
        </form>
    </div>
</div>
<script>
// Запрет прошедших дат
(function() {
    var now = new Date();
    now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
    document.getElementById('apptTime').min = now.toISOString().slice(0, 16);
})();
</script>
</body>
</html>
