<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Назначение анализов — MedSystem</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .test-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px,1fr)); gap: 14px; }
        .test-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; display: flex; flex-direction: column; gap: 10px; transition: border-color .15s; }
        .test-card:hover { border-color: var(--accent); }
        .test-card label { cursor: pointer; display: flex; gap: 12px; align-items: flex-start; }
        .test-card input[type=checkbox] { accent-color: var(--accent); width: 17px; height: 17px; flex-shrink: 0; margin-top: 2px; }
    </style>
</head>
<body>
<div class="layout">
    <div th:replace="~{fragments :: sidebar-doctor}" th:with="activePage='lab-tests'"></div>
    <main class="main">
        <div class="topbar">
            <div><h1>Назначение анализов</h1><p>Все виды исследований</p></div>
        </div>
        <div class="content">
            <div th:if="${success}" class="alert alert-success">✓ <span th:text="${success}"></span></div>

            <form th:action="@{/doctor/lab-tests/order}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="card" style="margin-bottom:20px">
                    <div class="card-header"><span class="card-title">Пациент</span></div>
                    <div class="card-body">
                        <div class="form-group">
                            <label>Выберите пациента</label>
                            <select name="patientId" required style="max-width:420px">
                                <option value="">— выберите —</option>
                                <option th:each="p : ${patients}" th:value="${p.id}"
                                        th:text="${p.user.fullName + (p.bloodType != null ? ' · ' + p.bloodType : '')}">—</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="card" style="margin-bottom:20px">
                    <div class="card-header">
                        <span class="card-title">Все анализы (<span th:text="${#lists.size(tests)}">0</span>)</span>
                    </div>
                    <div class="card-body">
                        <div class="test-grid">
                            <div th:each="t : ${tests}" class="test-card">
                                <label>
                                    <input type="checkbox" name="testIds" th:value="${t.id}">
                                    <div>
                                        <div style="font-weight:600;font-size:14px;line-height:1.3" th:text="${t.name}">—</div>
                                        <div style="font-size:12px;color:var(--text-muted);margin-top:4px" th:text="${t.description}">—</div>
                                    </div>
                                </label>
                                <div style="display:flex;justify-content:space-between;align-items:center;padding-top:8px;border-top:1px solid var(--border)">
                                    <span class="badge badge-cyan" th:text="${t.category}">—</span>
                                    <div style="text-align:right">
                                        <div style="font-weight:700;font-size:14px;font-family:'JetBrains Mono',monospace"
                                             th:text="${#numbers.formatDecimal(t.price,0,'COMMA',0,'POINT') + ' ₸'}">—</div>
                                        <div style="font-size:11px;color:var(--text-muted)"
                                             th:text="${'Результат: ' + (t.daysToResult ?: 1) + ' дн.'}">—</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div style="display:flex;justify-content:flex-end">
                    <button type="submit" class="btn btn-primary" style="padding:12px 32px;font-size:15px">
                        🧪 Назначить выбранные анализы
                    </button>
                </div>
            </form>
        </div>
    </main>
</div>
</body>
</html>
