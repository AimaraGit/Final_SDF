<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ошибка — MedSystem</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="layout">
    <div th:replace="~{fragments :: sidebar-doctor}" th:with="activePage=''"></div>
    <main class="main">
        <div class="topbar"><div><h1>Ошибка</h1></div></div>
        <div class="content">
            <div class="card">
                <div class="card-body" style="text-align:center;padding:60px 20px">
                    <div style="font-size:48px;margin-bottom:20px">⚠️</div>
                    <h2 style="margin-bottom:12px" th:text="${errorMsg}">Произошла ошибка</h2>
                    <p style="color:var(--text-muted);margin-bottom:24px">
                        Профиль врача не найден в системе. Возможно, база данных была сброшена.
                        Попробуйте выйти и войти снова, или обратитесь к администратору.
                    </p>
                    <form th:action="@{/logout}" method="post" style="display:inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-primary">Выйти и войти снова</button>
                    </form>
                </div>
            </div>
        </div>
    </main>
</div>
</body>
</html>
