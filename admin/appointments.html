<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Записи — MedSystem</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="layout">
    <div th:replace="~{fragments :: sidebar-admin}" th:with="activePage='appointments'"></div>
    <main class="main">
        <div class="topbar">
            <div><h1>Записи на приём</h1><p>Все записи в системе</p></div>
        </div>
        <div class="content">
            <div th:if="${success}" class="alert alert-success">✓ <span th:text="${success}"></span></div>
            <div class="card">
                <div class="table-wrap">
                    <table>
                        <thead><tr>
                            <th>Пациент</th><th>Врач</th><th>Дата и время</th>
                            <th>Причина</th><th>Статус</th><th>Действия</th>
                        </tr></thead>
                        <tbody>
                        <tr th:each="a : ${appointments}">
                            <td><strong th:text="${a.patient.user.fullName}">—</strong></td>
                            <td>
                                <div th:text="${a.doctor.user.fullName}">—</div>
                                <div style="font-size:11px;color:var(--text-muted)"
                                     th:text="${a.doctor.specialization}">—</div>
                            </td>
                            <td><span class="time-chip"
                                      th:text="${#temporals.format(a.appointmentTime,'dd.MM.yyyy HH:mm')}">—</span></td>
                            <td th:text="${a.reason != null ? a.reason : '—'}">—</td>
                            <td>
                                <span th:switch="${a.status.name()}">
                                    <span th:case="'SCHEDULED'"   class="badge badge-blue">Запланирован</span>
                                    <span th:case="'ACCEPTED'"    class="badge" style="background:rgba(16,185,129,.15);color:#34d399">Принят</span>
                                    <span th:case="'IN_PROGRESS'" class="badge badge-cyan">На приёме</span>
                                    <span th:case="'COMPLETED'"   class="badge badge-green">Завершён</span>
                                    <span th:case="'CANCELLED'"   class="badge badge-red">Отменён</span>
                                    <span th:case="'NO_SHOW'"     class="badge badge-gray">Не явился</span>
                                    <span th:case="*" class="badge badge-gray" th:text="${a.status}">—</span>
                                </span>
                            </td>
                            <td>
                                <form th:action="@{/admin/appointments/status/{id}(id=${a.id})}" method="post"
                                      style="display:flex;gap:8px;align-items:center">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <select name="status"
                                            style="background:var(--bg-card2);border:1px solid var(--border);color:var(--text);padding:5px 8px;border-radius:6px;font-size:13px">
                                        <option value="SCHEDULED"   th:selected="${a.status.name() == 'SCHEDULED'}">Запланирован</option>
                                        <option value="ACCEPTED"    th:selected="${a.status.name() == 'ACCEPTED'}">Принят</option>
                                        <option value="IN_PROGRESS" th:selected="${a.status.name() == 'IN_PROGRESS'}">На приёме</option>
                                        <option value="COMPLETED"   th:selected="${a.status.name() == 'COMPLETED'}">Завершён</option>
                                        <option value="CANCELLED"   th:selected="${a.status.name() == 'CANCELLED'}">Отменён</option>
                                        <option value="NO_SHOW"     th:selected="${a.status.name() == 'NO_SHOW'}">Не явился</option>
                                    </select>
                                    <button type="submit" class="btn btn-ghost btn-sm">✓</button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(appointments)}">
                            <td colspan="6">
                                <div class="empty-state"><div class="icon">📅</div><h3>Записей нет</h3></div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>
</body>
</html>
