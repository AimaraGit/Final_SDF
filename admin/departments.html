<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Отделения — MedSystem</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="layout">
    <div th:replace="~{fragments :: sidebar-admin}" th:with="activePage='departments'"></div>
    <main class="main">
        <div class="topbar">
            <div><h1>Отделения</h1><p>Управление отделениями больницы</p></div>
            <button class="btn btn-primary" onclick="document.getElementById('addModal').classList.add('open')">
                + Добавить отделение
            </button>
        </div>
        <div class="content">
            <div th:if="${success}" class="alert alert-success">✓ <span th:text="${success}"></span></div>
            <div class="stats-grid">
                <div class="stat-card blue" th:each="d : ${departments}">
                    <span class="stat-icon">🏢</span>
                    <div class="stat-value" th:text="${doctorCounts != null ? doctorCounts[d.id] : 0}">0</div>
                    <div class="stat-label" th:text="${d.name}">—</div>
                    <div style="margin-top:8px;font-size:12px;color:var(--text-muted)"
                         th:text="${'Этаж ' + (d.floor != null ? d.floor : '—')}">—</div>
                </div>
            </div>
            <div class="card">
                <div class="table-wrap">
                    <table>
                        <thead><tr>
                            <th>Название</th><th>Описание</th><th>Этаж</th><th>Зав. отделением</th><th>Врачей</th><th>Действия</th>
                        </tr></thead>
                        <tbody>
                        <tr th:each="d : ${departments}">
                            <td><strong th:text="${d.name}">—</strong></td>
                            <td th:text="${d.description != null ? d.description : '—'}">—</td>
                            <td th:text="${d.floor != null ? d.floor : '—'}">—</td>
                            <td th:text="${d.headDoctorName != null ? d.headDoctorName : '—'}">—</td>
                            <td><span class="badge badge-blue"
                                      th:text="${doctorCounts != null ? doctorCounts[d.id] : 0}">0</span></td>
                            <td class="actions">
                                <form th:action="@{/admin/departments/delete/{id}(id=${d.id})}" method="post"
                                      onsubmit="return confirm('Удалить отделение?')">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" class="btn btn-danger btn-sm">Удалить</button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(departments)}">
                            <td colspan="6">
                                <div class="empty-state"><div class="icon">🏢</div><h3>Отделений нет</h3></div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>

<div class="modal-overlay" id="addModal">
    <div class="modal">
        <button class="modal-close" onclick="document.getElementById('addModal').classList.remove('open')">✕</button>
        <div class="modal-title">Добавить отделение</div>
        <form th:action="@{/admin/departments/save}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="form-grid">
                <div class="form-group" style="grid-column:1/-1">
                    <label>Название</label>
                    <input type="text" name="name" placeholder="Кардиология" required>
                </div>
                <div class="form-group" style="grid-column:1/-1">
                    <label>Описание</label>
                    <input type="text" name="description" placeholder="Лечение заболеваний сердца">
                </div>
                <div class="form-group">
                    <label>Этаж</label>
                    <input type="text" name="floor" placeholder="3">
                </div>
                <div class="form-group">
                    <label>Зав. отделением</label>
                    <input type="text" name="headDoctorName" placeholder="Иванов А.П.">
                </div>
            </div>
            <div class="mt-6" style="display:flex;gap:12px;justify-content:flex-end">
                <button type="button" class="btn btn-ghost"
                        onclick="document.getElementById('addModal').classList.remove('open')">Отмена</button>
                <button type="submit" class="btn btn-primary">Сохранить</button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
