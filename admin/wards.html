<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Палаты — MedSystem</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="layout">
    <div th:replace="~{fragments :: sidebar-admin}" th:with="activePage='wards'"></div>
    <main class="main">
        <div class="topbar">
            <div><h1>Палаты</h1><p>Управление палатами и их заполняемостью</p></div>
            <button class="btn btn-primary" onclick="document.getElementById('addModal').classList.add('open')">
                + Добавить палату
            </button>
        </div>
        <div class="content">
            <div th:if="${success}" class="alert alert-success">✓ <span th:text="${success}"></span></div>
            <div class="card">
                <div class="table-wrap">
                    <table>
                        <thead><tr>
                            <th>Номер</th><th>Отделение</th><th>Тип</th>
                            <th>Вместимость</th><th>Занято</th><th>Свободно</th><th>Действия</th>
                        </tr></thead>
                        <tbody>
                        <tr th:each="w : ${wards}">
                            <td><strong th:text="${'Палата №' + w.number}">—</strong></td>
                            <td th:text="${w.department != null ? w.department.name : '—'}">—</td>
                            <td>
                                <span th:if="${w.type != null}" th:switch="${w.type.name()}">
                                    <span th:case="'STANDARD'"       class="badge badge-gray">Стандартная</span>
                                    <span th:case="'INTENSIVE_CARE'" class="badge badge-red">Интенсивная</span>
                                    <span th:case="'SURGERY'"        class="badge badge-orange">Хирургическая</span>
                                    <span th:case="'PRIVATE'"        class="badge badge-cyan">Одноместная</span>
                                    <span th:case="'CHILDREN'"       class="badge badge-blue">Детская</span>
                                    <span th:case="*" class="badge badge-gray" th:text="${w.type}">—</span>
                                </span>
                                <span th:unless="${w.type != null}">—</span>
                            </td>
                            <td th:text="${w.capacity != null ? w.capacity : 0}">0</td>
                            <td th:text="${w.occupied != null ? w.occupied : 0}">0</td>
                            <td>
                                <span th:if="${w.available > 0}" class="badge badge-green" th:text="${w.available}">0</span>
                                <span th:unless="${w.available > 0}" class="badge badge-red" th:text="${w.available}">0</span>
                            </td>
                            <td class="actions">
                                <form th:action="@{/admin/wards/delete/{id}(id=${w.id})}" method="post"
                                      onsubmit="return confirm('Удалить палату?')">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" class="btn btn-danger btn-sm">Удалить</button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(wards)}">
                            <td colspan="7">
                                <div class="empty-state"><div class="icon">🛏️</div><h3>Палат нет</h3></div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>

<div class="modal-overlay" id="addModal">
    <div class="modal">
        <button class="modal-close" onclick="document.getElementById('addModal').classList.remove('open')">✕</button>
        <div class="modal-title">Добавить палату</div>
        <form th:action="@{/admin/wards/save}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="form-grid">
                <div class="form-group">
                    <label>Номер палаты</label>
                    <input type="text" name="number" placeholder="101" required>
                </div>
                <div class="form-group">
                    <label>Отделение</label>
                    <select name="departmentId">
                        <option value="">— выберите —</option>
                        <option th:each="dep : ${departments}" th:value="${dep.id}" th:text="${dep.name}">—</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Тип палаты</label>
                    <select name="type">
                        <option value="STANDARD">Стандартная</option>
                        <option value="INTENSIVE_CARE">Интенсивная терапия</option>
                        <option value="SURGERY">Хирургическая</option>
                        <option value="PRIVATE">Одноместная</option>
                        <option value="CHILDREN">Детская</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Вместимость</label>
                    <input type="number" name="capacity" min="1" max="20" value="4">
                </div>
                <div class="form-group">
                    <label>Занято мест</label>
                    <input type="number" name="occupied" min="0" value="0">
                </div>
                <div class="form-group" style="grid-column:1/-1">
                    <label>Описание</label>
                    <input type="text" name="description" placeholder="Краткое описание">
                </div>
            </div>
            <div class="mt-6" style="display:flex;gap:12px;justify-content:flex-end">
                <button type="button" class="btn btn-ghost"
                        onclick="document.getElementById('addModal').classList.remove('open')">Отмена</button>
                <button type="submit" class="btn btn-primary">Сохранить</button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
