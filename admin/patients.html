<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Пациенты — MedSystem</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="layout">
    <div th:replace="~{fragments :: sidebar-admin}" th:with="activePage='patients'"></div>
    <main class="main">
        <div class="topbar">
            <div><h1>Пациенты</h1><p>Управление базой пациентов</p></div>
            <button class="btn btn-primary" onclick="document.getElementById('addModal').classList.add('open')">
                + Добавить пациента
            </button>
        </div>
        <div class="content">
            <div th:if="${success}" class="alert alert-success">✓ <span th:text="${success}"></span></div>
            <div th:if="${error}"   class="alert alert-danger">⚠ <span th:text="${error}"></span></div>

            <div class="card">
                <div class="card-header">
                    <span class="card-title">Все пациенты (<span th:text="${#lists.size(patients)}">0</span>)</span>
                </div>
                <div class="table-wrap">
                    <table>
                        <thead><tr>
                            <th>ФИО</th><th>Логин</th><th>Телефон</th>
                            <th>Дата рождения</th><th>Группа крови</th><th>Действия</th>
                        </tr></thead>
                        <tbody>
                        <tr th:each="p : ${patients}">
                            <td><strong th:text="${p.user.fullName}">—</strong></td>
                            <td><span class="badge badge-gray" th:text="${p.user.username}">—</span></td>
                            <td th:text="${p.phone != null ? p.phone : '—'}">—</td>
                            <td th:text="${p.dateOfBirth != null ? #temporals.format(p.dateOfBirth,'dd.MM.yyyy') : '—'}">—</td>
                            <td>
                                <span th:if="${p.bloodType != null}" class="badge badge-cyan" th:text="${p.bloodType}">—</span>
                                <span th:unless="${p.bloodType != null}">—</span>
                            </td>
                            <td class="actions">
                                <button class="btn btn-ghost btn-sm"
                                        th:data-patient-id="${p.id}"
                                        th:data-patient-name="${p.user.fullName}"
                                        onclick="openWardModal(this.dataset.patientId, this.dataset.patientName)">
                                    🛏️ Палата
                                </button>
                                <form th:action="@{/admin/patients/delete/{id}(id=${p.id})}" method="post"
                                      onsubmit="return confirm('Удалить пациента?')">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" class="btn btn-danger btn-sm">Удалить</button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(patients)}">
                            <td colspan="6">
                                <div class="empty-state">
                                    <div class="icon">🧑‍⚕️</div>
                                    <h3>Пациентов нет</h3>
                                    <p>Добавьте первого пациента</p>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- WARD ASSIGNMENT MODAL -->
<div class="modal-overlay" id="wardModal">
    <div class="modal" style="width:580px">
        <button class="modal-close" onclick="document.getElementById('wardModal').classList.remove('open')">✕</button>
        <div class="modal-title">🛏️ Назначить палату</div>
        <div style="margin-bottom:16px;padding:12px 14px;background:var(--bg-card2);border-radius:var(--radius-sm);font-size:14px">
            Пациент: <strong id="wardPatientName">—</strong>
        </div>
        <form id="wardForm" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="form-group" style="margin-bottom:16px">
                <label>Выберите палату</label>
                <select name="wardId" required>
                    <option value="">— выберите —</option>
                    <th:block th:each="w : ${wards}">
                        <option th:value="${w.id}"
                                th:text="${'Палата №' + w.number + ' · ' + (w.department != null ? w.department.name : '—') + ' · свободно: ' + w.available + ' из ' + w.capacity}">—</option>
                    </th:block>
                </select>
            </div>
            <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:16px;max-height:200px;overflow-y:auto">
                <div th:each="w : ${wards}"
                     style="padding:10px 12px;background:var(--bg-card2);border:1px solid var(--border);border-radius:var(--radius-sm)">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
                        <span style="font-weight:600;font-size:13px" th:text="'Палата №' + ${w.number}">—</span>
                        <span th:if="${w.available > 0}" class="badge badge-green" th:text="${w.available + ' своб.'}">—</span>
                        <span th:unless="${w.available > 0}" class="badge badge-red">Нет мест</span>
                    </div>
                    <div style="height:5px;background:var(--border);border-radius:3px;overflow:hidden">
                        <div th:if="${w.capacity != null and w.capacity > 0}"
                             th:style="'width:' + ${(w.occupied != null ? w.occupied : 0) * 100 / w.capacity} + '%;height:100%;border-radius:3px;background:var(--accent)'"></div>
                    </div>
                    <div style="font-size:11px;color:var(--text-muted);margin-top:3px"
                         th:text="${(w.occupied != null ? w.occupied : 0) + ' / ' + (w.capacity != null ? w.capacity : 0) + ' · ' + (w.department != null ? w.department.name : '—')}">—</div>
                </div>
            </div>
            <div class="form-group" style="margin-bottom:20px">
                <label>Причина / Примечание</label>
                <input type="text" name="notes" placeholder="Плановая госпитализация, наблюдение...">
            </div>
            <div style="display:flex;gap:12px;justify-content:flex-end">
                <button type="button" class="btn btn-ghost"
                        onclick="document.getElementById('wardModal').classList.remove('open')">Отмена</button>
                <button type="submit" class="btn btn-primary">Поместить в палату</button>
            </div>
        </form>
    </div>
</div>

<!-- ADD PATIENT MODAL -->
<div class="modal-overlay" id="addModal">
    <div class="modal" style="width:640px">
        <button class="modal-close" onclick="document.getElementById('addModal').classList.remove('open')">✕</button>
        <div class="modal-title">Добавить пациента</div>
        <form th:action="@{/admin/patients/save}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="form-grid">
                <div class="form-group"><label>ФИО</label>
                    <input type="text" name="fullName" placeholder="Иванов Иван Иванович" required></div>
                <div class="form-group"><label>Логин</label>
                    <input type="text" name="username" placeholder="ivanov_i" required></div>
                <div class="form-group"><label>Email</label>
                    <input type="email" name="email" placeholder="ivanov@mail.kz"></div>
                <div class="form-group"><label>Пароль</label>
                    <input type="password" name="password" required></div>
                <div class="form-group"><label>Телефон</label>
                    <input type="text" name="phone" placeholder="+7 777 000 0000"></div>
                <div class="form-group"><label>Дата рождения</label>
                    <input type="date" name="dateOfBirth"></div>
                <div class="form-group"><label>Пол</label>
                    <select name="gender">
                        <option value="">— выберите —</option>
                        <option value="MALE">Мужской</option>
                        <option value="FEMALE">Женский</option>
                        <option value="OTHER">Другой</option>
                    </select></div>
                <div class="form-group"><label>Группа крови</label>
                    <select name="bloodType">
                        <option value="">— выберите —</option>
                        <option>A+</option><option>A-</option><option>B+</option><option>B-</option>
                        <option>AB+</option><option>AB-</option><option>O+</option><option>O-</option>
                    </select></div>
                <div class="form-group" style="grid-column:1/-1"><label>Адрес</label>
                    <input type="text" name="address" placeholder="г. Алматы, ул. Абая 1"></div>
                <div class="form-group" style="grid-column:1/-1"><label>Аллергии</label>
                    <input type="text" name="allergies" placeholder="Пенициллин, нет"></div>
                <div class="form-group"><label>Экстренный контакт</label>
                    <input type="text" name="emergencyContact" placeholder="ФИО"></div>
                <div class="form-group"><label>Телефон экстренной связи</label>
                    <input type="text" name="emergencyPhone" placeholder="+7 777 000 0000"></div>
            </div>
            <div class="mt-6" style="display:flex;gap:12px;justify-content:flex-end">
                <button type="button" class="btn btn-ghost"
                        onclick="document.getElementById('addModal').classList.remove('open')">Отмена</button>
                <button type="submit" class="btn btn-primary">Сохранить</button>
            </div>
        </form>
    </div>
</div>

<script>
function openWardModal(patientId, patientName) {
    document.getElementById('wardForm').action = '/admin/patients/' + patientId + '/assign-ward';
    document.getElementById('wardPatientName').textContent = patientName;
    document.getElementById('wardModal').classList.add('open');
}
</script>
</body>
</html>
